version: '3' 

services:

  mariadb:
    image: mariadb
    container_name: nextcloud-mariadb
    networks:
      - nextcloud_network
    volumes:
      - ${DATABASE_DIR}/db:/var/lib/mysql
      - /etc/localtime:/etc/localtime:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    restart: unless-stopped
    labels:
      - wud.watch=false
  
  app:
    image: nextcloud:31.0.4
    container_name: nextcloud
    networks:
      - nextcloud_network
      - traefik-net
    depends_on:
      - mariadb
    volumes:
      - ${APP_DIR}/app:/var/www/html
      - ${APP_DIR}/app/config:/var/www/html/config
      - ${APP_DIR}/app/custom_apps:/var/www/html/custom_apps
      - ${APP_DIR}/app/data:/var/www/html/data
      - ${APP_DIR}/app/themes:/var/www/html/themes
      - /etc/localtime:/etc/localtime:ro
    environment:
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - VIRTUAL_HOST=${VIRTUAL_HOST}
    restart: unless-stopped
    labels:
      - wud.tag.include=^\d+\.\d+\.\d+$$
      - wud.tag.transform=^(\d+\.\d+)\.\d+$$ => $$1

networks:
  nextcloud_network:
  traefik-net:
    external: true
