services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:2.39.0
    command: -H unix:///var/run/docker.sock --http-enabled --no-analytics
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/data
    labels:
      - wud.tag.include=^\d+\.\d+\.\d+$$
      - wud.tag.transform=^(\d+\.\d+)\.\d+$$ => $$1
    networks:
      traefik-net:
        aliases:
          - portainer

networks:
  traefik-net:
    external: true
